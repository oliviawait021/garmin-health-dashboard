name: dbt CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'dbt_project/**'

jobs:
  dbt-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt
        run: pip install dbt-core dbt-postgres

      - name: Write profiles.yml
        working-directory: dbt_project
        env:
          DBT_HOST:     ${{ secrets.DBT_HOST }}
          DBT_PASSWORD: ${{ secrets.DBT_PASSWORD }}
        run: |
          cat > profiles.yml <<EOF
          garmin_health:
            outputs:
              dev:
                type: postgres
                host: $DBT_HOST
                port: 5432
                user: postgres
                password: $DBT_PASSWORD
                dbname: postgres
                schema: dbt_dev
                threads: 1
            target: dev
          EOF

      - name: dbt deps
        working-directory: dbt_project
        run: dbt deps

      - name: dbt build (dev)
        working-directory: dbt_project
        env:
          DBT_PROFILES_DIR: .
        run: dbt build --target dev
