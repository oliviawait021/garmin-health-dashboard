name: dbt CI

on:
  pull_request:
    branches: [main]

jobs:
  dbt-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dbt
        run: pip install dbt-core dbt-postgres

      - name: Write profiles.yml
        working-directory: dbt_project
        env:
          DBT_POOLER_HOST: ${{ secrets.DBT_POOLER_HOST }}
          DBT_PASSWORD:    ${{ secrets.DBT_PASSWORD }}
        run: |
          cat > profiles.yml <<EOF
          garmin_health:
            outputs:
              dev:
                type: postgres
                host: ${DBT_POOLER_HOST}
                port: 6543
                user: postgres.zyfsiqpgscyqfstajlfm
                password: ${DBT_PASSWORD}
                dbname: postgres
                schema: dbt_ci
                threads: 2
                sslmode: require
            target: dev
          EOF

      - name: dbt deps
        working-directory: dbt_project
        env:
          DBT_PROFILES_DIR: .
        run: dbt deps

      - name: dbt compile (syntax check)
        working-directory: dbt_project
        env:
          DBT_PROFILES_DIR: .
        run: dbt compile

      - name: dbt seed
        working-directory: dbt_project
        env:
          DBT_PROFILES_DIR: .
        run: dbt seed

      - name: dbt run
        working-directory: dbt_project
        env:
          DBT_PROFILES_DIR: .
        run: dbt run

      - name: dbt test
        working-directory: dbt_project
        env:
          DBT_PROFILES_DIR: .
        run: dbt test

      - name: Cleanup CI schema
        if: always()
        working-directory: dbt_project
        env:
          DBT_PROFILES_DIR: .
          PGPASSWORD: ${{ secrets.DBT_PASSWORD }}
        run: |
          psql -h ${{ secrets.DBT_HOST }} -U postgres -d postgres \
            -c "DROP SCHEMA IF EXISTS dbt_ci CASCADE;" \
            -c "DROP SCHEMA IF EXISTS dbt_ci_staging CASCADE;" \
            -c "DROP SCHEMA IF EXISTS dbt_ci_intermediate CASCADE;" \
            -c "DROP SCHEMA IF EXISTS dbt_ci_marts CASCADE;" || true
